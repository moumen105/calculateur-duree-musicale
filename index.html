<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Calculateur de Durée Musicale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
        }
        .container {
            max-width: 650px;
            margin-top: 2rem;
            padding: 2rem;
            background-color: #2a2a2a;
            border-radius: 15px;
        }
        h1 { color: #4d94ff; text-align: center; }
        .form-control, .form-select {
            background-color: #333;
            color: #e0e0e0;
        }
        .btn-primary { background-color: #4d94ff; }
        .result-card {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #333;
            border-radius: 10px;
            display: none;
        }
        .symbol-display {
            font-size: 3rem;
            text-align: center;
            color: #4d94ff;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>🎵 Calculateur de Durée Musicale</h1>

    <form id="calculForm">

        <input type="number" id="mesures" placeholder="Mesures" class="form-control mt-2" required>
        <input type="number" id="numerateur" placeholder="Numérateur" class="form-control mt-2" required>
        <input type="number" id="denominateur" placeholder="Dénominateur" class="form-control mt-2" required>

        <select id="note" class="form-select mt-2">
            <option>ronde</option>
            <option>blanche</option>
            <option>noire</option>
            <option>croche</option>
            <option>double croche</option>
        </select>

        <div class="symbol-display" id="symbolDisplay">❓</div>

        <input type="number" id="tempo" placeholder="Tempo BPM" class="form-control mt-2" required>

        <button class="btn btn-primary mt-3 w-100">Calculer</button>
    </form>

    <div class="result-card" id="resultCard">
        <h3>Résultat</h3>
        <p>Minutes: <span id="minutes"></span></p>
        <p>Secondes: <span id="seconds"></span></p>
    </div>
</div>

<script>
const notes = {
    'ronde': 1,
    'blanche': 1/2,
    'noire': 1/4,
    'croche': 1/8,
    'double croche': 1/16
};

const symbols = {
    'ronde': 'o',
    'blanche': 'b',
    'noire': '♩',
    'croche': '♪',
    'double croche': '♫'
};

document.getElementById("note").addEventListener("change", function(){
    document.getElementById("symbolDisplay").textContent = symbols[this.value];
});

document.getElementById("calculForm").addEventListener("submit", function(e){
    e.preventDefault();

    let mesures = parseFloat(document.getElementById("mesures").value);
    let numerateur = parseFloat(document.getElementById("numerateur").value);
    let denominateur = parseFloat(document.getElementById("denominateur").value);
    let tempo = parseFloat(document.getElementById("tempo").value);
    let note = document.getElementById("note").value;

    let note_val = notes[note];

    let facteur = (1 / denominateur) / note_val;
    let nouveau = numerateur * facteur;
    let duree = (mesures * nouveau) / tempo;

    let minutes = Math.floor(duree);
    let seconds = Math.floor((duree - minutes) * 60);

    document.getElementById("minutes").textContent = minutes;
    document.getElementById("seconds").textContent = seconds;

    document.getElementById("resultCard").style.display = "block";
});
</script>

</body>
</html>
