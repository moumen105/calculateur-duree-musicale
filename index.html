<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Calculateur de Durée Musicale</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #1a1a1a;
    color: #e0e0e0;
    font-family: Arial;
}
.container {
    max-width: 650px;
    margin-top: 2rem;
    padding: 2rem;
    background-color: #2a2a2a;
    border-radius: 15px;
}
h1 {
    color: #4d94ff;
    text-align: center;
}
.form-control, .form-select {
    background-color: #333;
    color: #fff;
}
.result-card {
    margin-top: 2rem;
    padding: 1.5rem;
    background-color: #333;
    border-radius: 10px;
    display: none;
}
.symbol-display {
    font-size: 3rem;
    text-align: center;
    color: #4d94ff;
}
</style>
</head>

<body>

<div class="container">
<h1>🎵 Calculateur de Durée Musicale</h1>

<form id="calculForm">

<input type="number" id="mesures" class="form-control mt-2" placeholder="Nombre de mesures" required>
<input type="number" id="numerateur" class="form-control mt-2" placeholder="Numérateur" required>
<input type="number" id="denominateur" class="form-control mt-2" placeholder="Dénominateur" required>

<select id="note" class="form-select mt-2"></select>

<div class="symbol-display" id="symbolDisplay">❓</div>

<input type="number" id="tempo" class="form-control mt-2" placeholder="Tempo (BPM)" required>

<button class="btn btn-primary mt-3 w-100">Calculer</button>

</form>

<div class="result-card" id="resultCard">
<h3 class="text-center mb-4">Résultat du calcul</h3>

<p>🕰️ <span id="millenaires"></span></p>
<p>🗿 <span id="centuries"></span></p>
<p>📅 <span id="years"></span></p>
<p>📅 <span id="months"></span></p>
<p>📅 <span id="days"></span></p>
<p>⏰ <span id="hours"></span></p>
<p>⏰ <span id="minutes"></span></p>
<p>⏰ <span id="seconds"></span></p>
<p>⏰ <span id="milliseconds"></span></p>

</div>
</div>

<script>

// valeurs des notes
const noteValues = {
    'ronde': 1,
    'blanche': 1/2,
    'noire': 1/4,
    'croche': 1/8,
    'double croche': 1/16,
    'triple croche': 1/32
};

// symboles
const noteSymbols = {
    'ronde': 'o',
    'blanche': 'b',
    'noire': '♩',
    'croche': '♪',
    'double croche': '♫',
    'triple croche': '♬'
};

const noteSelect = document.getElementById('note');
const symbolDisplay = document.getElementById('symbolDisplay');
const resultCard = document.getElementById('resultCard');

// remplir la liste des notes
noteSelect.innerHTML = Object.keys(noteValues)
    .map(n => `<option value="${n}">${n}</option>`)
    .join('');

// afficher symbole
function updateSymbol(note) {
    symbolDisplay.textContent = noteSymbols[note] || '❓';
}
updateSymbol(noteSelect.value);

noteSelect.addEventListener('change', function() {
    updateSymbol(this.value);
});

// conversion temps
function convertirTemps(minutesTotal) {

    let totalSeconds = minutesTotal * 60;

    let minutes = Math.floor(minutesTotal);
    let seconds = Math.floor(totalSeconds % 60);
    let milliseconds = Math.floor((totalSeconds - Math.floor(totalSeconds)) * 1000);

    return {
        millenaires: 0,
        centuries: 0,
        years: 0,
        months: 0,
        days: 0,
        hours: 0,
        minutes,
        seconds,
        milliseconds
    };
}

// calcul principal
document.getElementById('calculForm').addEventListener('submit', function(e) {
    e.preventDefault();

    let mesures = parseFloat(document.getElementById('mesures').value);
    let numerateur = parseFloat(document.getElementById('numerateur').value);
    let denominateur = parseFloat(document.getElementById('denominateur').value);
    let tempo = parseFloat(document.getElementById('tempo').value);
    let note = noteSelect.value;

    let note_val = noteValues[note];

    if (!note_val) {
        alert("Note invalide");
        return;
    }

    let facteur = (1 / denominateur) / note_val;
    let nouveau = numerateur * facteur;
    let duree = (mesures * nouveau) / tempo;

    let result = convertirTemps(duree);

    // affichage
    for (let key in result) {
        document.getElementById(key).textContent = result[key];
    }

    resultCard.style.display = 'block';
});

</script>

</body>
</html>
